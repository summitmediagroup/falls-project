:root{
  --bg:#0c1410;--surf:#111c14;--raised:#182218;--bdr:rgba(255,255,255,.07);
  --gold:#c8963c;--amber:#e0a840;--cream:#f0e8d8;--mist:#9ab09a;
  --sage:#5a7a5c;--river:#4a7c96;--ice:#a0c4d4;--white:#fdfcfa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);}
body{font-family:"DM Sans",sans-serif;color:var(--cream);display:flex;flex-direction:column;overflow:hidden;}
#nav{height:56px;background:rgba(11,18,12,.97);backdrop-filter:blur(18px);border-bottom:1px solid rgba(200,150,60,.12);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:400;}
.nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0;}
.nav-brand img{width:38px;height:38px;border-radius:50%;object-fit:cover;}
.nav-brand-txt{display:flex;flex-direction:column;line-height:1.15;}
.nav-brand-eye{font-size:.46rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-family:"Cormorant",serif;}
.nav-brand-name{font-family:"Cormorant",serif;font-size:.93rem;color:var(--cream);letter-spacing:.05em;white-space:nowrap;}
.nav-tabs{display:flex;margin:0 auto;}
.ntab{padding:6px 14px;background:transparent;border:none;color:rgba(255,255,255,.38);font-family:"DM Sans",sans-serif;font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:color .2s;position:relative;}
.ntab::after{content:"";position:absolute;bottom:-1px;left:14px;right:14px;height:1px;background:var(--gold);transform:scaleX(0);transition:transform .25s;}
.ntab:hover{color:rgba(255,255,255,.65);}
.ntab.on{color:var(--cream);}
.ntab.on::after{transform:scaleX(1);}
#auth-area{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.btn-ghost{padding:5px 12px;background:transparent;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.6);font-family:"DM Sans",sans-serif;font-size:.65rem;cursor:pointer;transition:all .2s;border-radius:2px;}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-gold{padding:5px 13px;background:var(--gold);border:none;color:var(--bg);font-family:"DM Sans",sans-serif;font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .2s;border-radius:2px;}
.btn-gold:hover{background:var(--amber);}
.nav-user{display:flex;align-items:center;gap:8px;}
.nav-av{width:28px;height:28px;border-radius:50%;background:var(--sage);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--gold);}
#app{flex:1;overflow:hidden;display:flex;min-height:0;}
.page{display:none;flex:1;overflow:hidden;min-height:0;}
.page.on{display:flex;}
#pg-land{flex-direction:column;overflow-y:auto;}
.hero{min-height:calc(100vh - 56px);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:0 40px 72px;flex-shrink:0;}
.hero-bg{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr 1fr;}
.hero-bg div{background-size:cover;background-position:center;filter:brightness(.42) saturate(.65);}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(12,20,16,.1) 0%,rgba(12,20,16,.6) 60%,rgba(12,20,16,1) 100%);}
.hero-body{position:relative;z-index:1;max-width:620px;}
.hero-eye{font-family:"Cormorant",serif;font-size:.58rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.hero-h1{font-family:"Cormorant",serif;font-size:clamp(2.8rem,5.5vw,5rem);font-weight:300;line-height:1.05;color:var(--white);margin-bottom:16px;}
.hero-h1 em{font-style:italic;color:var(--gold);}
.hero-sub{font-size:.88rem;color:rgba(255,255,255,.5);line-height:1.7;max-width:460px;margin-bottom:30px;}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap;}
.cta-p{padding:13px 28px;background:var(--gold);color:var(--bg);border:none;font-family:"DM Sans",sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s;border-radius:2px;}
.cta-p:hover{background:var(--amber);}
.cta-s{padding:13px 28px;background:transparent;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.2);font-family:"DM Sans",sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s;border-radius:2px;}
.cta-s:hover{border-color:var(--gold);color:var(--gold);}
.feats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.feat{background:var(--bg);padding:36px 28px;}
.feat-icon{font-size:1.7rem;margin-bottom:12px;}
.feat-title{font-family:"Cormorant",serif;font-size:1.15rem;color:var(--cream);margin-bottom:7px;}
.feat-desc{font-size:.76rem;color:rgba(255,255,255,.36);line-height:1.7;}
.land-cta{padding:56px 40px;text-align:center;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.land-cta h2{font-family:"Cormorant",serif;font-size:1.9rem;font-weight:300;color:var(--cream);margin-bottom:8px;}
.land-cta p{font-size:.8rem;color:rgba(255,255,255,.32);margin-bottom:22px;}
#pg-map{flex-direction:row;}
#sidebar{width:320px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:14px 14px 12px;border-bottom:1px solid var(--bdr);background:var(--raised);flex-shrink:0;}
.sb-eye{font-size:.52rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-family:"Cormorant",serif;margin-bottom:2px;}
.sb-title{font-family:"Cormorant",serif;font-size:1.05rem;font-weight:300;color:var(--cream);margin-bottom:10px;}
.prog-wrap{height:2px;background:rgba(255,255,255,.08);margin-bottom:5px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--sage),var(--gold));transition:width .5s;}
.prog-txt{font-size:.58rem;color:var(--mist);margin-bottom:10px;}
.ftabs{display:flex;gap:5px;margin-bottom:9px;}
.ftab{padding:4px 10px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.36);font-family:"DM Sans",sans-serif;font-size:.6rem;font-weight:500;letter-spacing:.07em;cursor:pointer;transition:all .2s;border-radius:1px;}
.ftab.on{background:var(--gold);border-color:var(--gold);color:var(--bg);}
.sb-search{width:100%;padding:7px 11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);color:var(--cream);font-family:"DM Sans",sans-serif;font-size:.77rem;outline:none;border-radius:2px;}
.sb-search::placeholder{color:rgba(255,255,255,.2);}
#falls-list{flex:1;overflow-y:auto;}
#falls-list::-webkit-scrollbar{width:3px;}
#falls-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);}
.fi{display:flex;align-items:stretch;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;position:relative;overflow:hidden;}
.fi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .2s;}
.fi.done::before{background:var(--gold);}
.fi:hover{background:rgba(255,255,255,.03);}
.fi-body{padding:10px 12px 10px 14px;flex:1;min-width:0;}
.fi-name{font-family:"Cormorant",serif;font-size:.9rem;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.fi-reg{font-size:.58rem;letter-spacing:.09em;text-transform:uppercase;color:var(--mist);margin-bottom:5px;}
.fi-chips{display:flex;gap:3px;flex-wrap:wrap;}
.chip{font-size:.55rem;padding:2px 6px;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.36);}
.chip.h{border-color:rgba(200,80,40,.4);color:rgba(200,120,80,.9);}
.chip.w{border-color:rgba(74,124,150,.4);color:var(--ice);}
.fi-date{font-size:.57rem;color:var(--gold);margin-top:3px;}
.fi-thumb{width:50px;height:50px;object-fit:cover;align-self:center;margin:8px 10px 8px 0;flex-shrink:0;border:1px solid rgba(200,150,60,.2);opacity:.8;}
.fi-tick{position:absolute;top:7px;right:7px;width:14px;height:14px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:var(--bg);opacity:0;transition:opacity .2s;}
.fi.done .fi-tick{opacity:1;}
#map-el{flex:1;z-index:1;}
.leaflet-tile{filter:brightness(.65) saturate(.5) contrast(1.1);}
.leaflet-container{background:var(--bg)!important;}
#pg-explore{flex-direction:column;overflow-y:auto;}
.ex-hero{height:380px;position:relative;overflow:hidden;flex-shrink:0;}
.ex-hero-bg{position:absolute;inset:0;display:flex;}
.ex-hero-bg div{flex:1;background-size:cover;background-position:center;filter:brightness(.42) saturate(.65);}
.ex-hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(12,20,16,.1) 0%,rgba(12,20,16,.7) 65%,var(--bg) 100%);}
.ex-hero-txt{position:absolute;bottom:32px;left:32px;right:32px;}
.ex-eye{font-family:"Cormorant",serif;font-size:.56rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:7px;}
.ex-h1{font-family:"Cormorant",serif;font-size:clamp(1.7rem,3vw,2.6rem);font-weight:300;color:var(--white);line-height:1.1;margin-bottom:9px;}
.ex-h1 em{font-style:italic;color:var(--gold);}
.ex-sub{font-size:.78rem;color:rgba(255,255,255,.42);max-width:380px;line-height:1.65;}
.ex-sec{display:flex;align-items:center;gap:14px;padding:26px 28px 14px;}
.ex-sec-lbl{font-family:"Cormorant",serif;font-size:.56rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);white-space:nowrap;}
.ex-sec-line{flex:1;height:1px;background:rgba(255,255,255,.06);}
.ex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;padding:0 28px 56px;background:rgba(255,255,255,.04);}
.ex-wrap{background:var(--bg);}
.pcard{background:var(--surf);cursor:pointer;overflow:hidden;transition:transform .25s;}
.pcard:hover{transform:scale(1.015);z-index:2;}
.pcard-img{height:185px;overflow:hidden;position:relative;background:var(--raised);}
.pcard-img img{width:100%;height:100%;object-fit:cover;filter:brightness(.8) saturate(.8);}
.pcard-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;opacity:.25;}
.pcard-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(12,20,16,.8) 0%,transparent 55%);}
.pcard-stars{position:absolute;top:10px;right:10px;background:rgba(12,20,16,.7);padding:3px 8px;font-size:.64rem;color:var(--gold);border:1px solid rgba(200,150,60,.25);}
.pcard-body{padding:13px 15px 15px;border:1px solid var(--bdr);border-top:none;}
